name: Flowscope Check

# Runs flowscope against every example file. Bad examples are expected to
# produce violations -- '|| true' lets the step exit 0 so GHA does not emit
# a spurious "Process completed with exit code 1" annotation. The clean
# example has no '|| true' and will fail the check if it ever regresses.
#
# Manual git checkout is used instead of actions/checkout to avoid the
# Node.js 20 deprecation warning from that action.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install flowscope
        run: pip install "git+https://github.com/mshade/flowscope.git" --quiet

      - name: "write-all.yml -- expect HARD_BLOCK (Rule 1)"
        run: flowscope examples/write-all.yml || true

      - name: "implicit-full-access.yml -- expect HARD_BLOCK (Rule 2)"
        run: flowscope examples/implicit-full-access.yml || true

      - name: "workflow-level-write-bleed.yml -- expect HARD_BLOCK (Rule 3)"
        run: flowscope examples/workflow-level-write-bleed.yml || true

      - name: "agentic-requires-review.yml -- expect REQUIRES_REVIEW (Rule 4)"
        run: flowscope examples/agentic-requires-review.yml || true

      - name: "clean-least-privilege.yml -- must pass"
        run: flowscope .github/workflows/clean-least-privilege.yml
