name: Flowscope Check

# Two jobs:
#
# scan: hard enforcement. Bad examples use '|| true' so GHA doesn't emit
#   spurious annotations -- this is a shell-level demo convenience, not the
#   warn-only feature. The clean example has no '|| true' and will fail the
#   job if it ever regresses.
#
# audit: warn-only mode. Runs the same bad examples with --warn-only, which
#   makes flowscope itself exit 0. No '|| true' needed -- the flag is doing
#   the work. Step summary shows violations marked as "would have failed".
#   This is what a gradual rollout looks like before enforcement is enabled.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    name: Hard enforcement
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install flowscope
        run: pip install "git+https://github.com/mshade/flowscope.git" --quiet

      - name: "write-all.yml -- expect HARD_BLOCK (Rule 1)"
        run: flowscope examples/write-all.yml || true

      - name: "implicit-full-access.yml -- expect HARD_BLOCK (Rule 2)"
        run: flowscope examples/implicit-full-access.yml || true

      - name: "workflow-level-write-bleed.yml -- expect HARD_BLOCK (Rule 3)"
        run: flowscope examples/workflow-level-write-bleed.yml || true

      - name: "agentic-requires-review.yml -- expect REQUIRES_REVIEW (Rule 4)"
        run: flowscope examples/agentic-requires-review.yml || true

      - name: "pull-request-target-poisoning.yml -- expect HARD_BLOCK (Rule 5)"
        run: flowscope examples/pull-request-target-poisoning.yml || true

      - name: "workflow-run-chain.yml -- expect REQUIRES_REVIEW (Rule 6)"
        run: flowscope examples/workflow-run-chain.yml || true

      - name: "clean-least-privilege.yml -- must pass"
        run: flowscope .github/workflows/clean-least-privilege.yml

  audit:
    name: Warn-only (audit mode)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install flowscope
        run: pip install "git+https://github.com/mshade/flowscope.git" --quiet

      - name: "write-all.yml -- violations reported, exit 0"
        run: flowscope --warn-only examples/write-all.yml

      - name: "implicit-full-access.yml -- violations reported, exit 0"
        run: flowscope --warn-only examples/implicit-full-access.yml

      - name: "workflow-level-write-bleed.yml -- violations reported, exit 0"
        run: flowscope --warn-only examples/workflow-level-write-bleed.yml

      - name: "agentic-requires-review.yml -- violations reported, exit 0"
        run: flowscope --warn-only examples/agentic-requires-review.yml

      - name: "pull-request-target-poisoning.yml -- violations reported, exit 0"
        run: flowscope --warn-only examples/pull-request-target-poisoning.yml

      - name: "workflow-run-chain.yml -- violations reported, exit 0"
        run: flowscope --warn-only examples/workflow-run-chain.yml

      - name: "clean-least-privilege.yml -- passes in both modes"
        run: flowscope --warn-only .github/workflows/clean-least-privilege.yml
